<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STUDY GROUP SLT Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* General body styling */
body {
    font-family: Arial, sans-serif;
    background-color: white;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* Header styling */
header {
    background-color: #1d4ed8;
    color: white;
    padding: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}
header img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid white;
}
header h2 {
    margin: 0;
    font-size: 32px;
    font-weight: bold;
}

/* Container for forms */
.container {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Inputs */
input {
    width: 90%;
    max-width: 400px;
    padding: 20px;
    margin: 15px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 18px;
    box-sizing: border-box;
}

/* Buttons */
button {
    padding: 18px 40px;
    background: #1d4ed8;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    margin-top: 15px;
    width: 60%;
    max-width: 300px;
}
button:hover {
    background: #2563eb;
}

/* Messages */
#msg {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
    color: #dc2626;
}

/* Links */
a {
    display: block;
    margin-top: 20px;
    color: #1d4ed8;
    cursor: pointer;
    text-decoration: underline;
    font-size: 18px;
}

/* Hide elements */
.hidden { display: none; }

/* Mobile-first adjustments */
@media screen and (max-width: 480px) {
    header h2 {
        font-size: 28px;
    }
    header img {
        width: 90px;
        height: 90px;
    }
    input {
        padding: 18px;
        font-size: 17px;
    }
    button {
        padding: 16px 35px;
        font-size: 17px;
        width: 70%;
    }
    a {
        font-size: 17px;
    }
}
</style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/wt6gV7BL/logo.png" alt="Logo">
    <h2>STUDY GROUP SLT</h2>
</header>

<div class="container">

<!-- Login Form -->
<div id="loginForm">
    <h3 style="font-size:22px; margin-bottom:20px;">Login to your portal</h3>
    <input id="loginReg" placeholder="Registration Number"><br>
    <input id="loginPass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <a onclick="showSignup()">Don't have an account? Signup</a>
</div>

<!-- Signup Form -->
<div id="signupForm" class="hidden">
    <h3 style="font-size:22px; margin-bottom:20px;">Create Your Account</h3>
    <input id="signupReg" placeholder="Registration Number"><br>
    <input id="signupPass" type="password" placeholder="Create Password (8+ chars)"><br>
    <button onclick="signup()">Create Account</button>
    <a onclick="showLogin()">Back to Login</a>
</div>

<p id="msg"></p>
</div>

<script>
// Valid registration numbers
const validRegs = [
    "2025SGS01","2025SGS02","2025SGS03",
    "2025SGS04","2025SGS05","2025SGS06",
    "2025SGS07","2025SGS08","2025SGS09"
];

// Login function
function login() {
    const reg = document.getElementById("loginReg").value.trim();
    const pass = document.getElementById("loginPass").value;
    const stored = localStorage.getItem(reg);
    const msg = document.getElementById("msg");
    msg.style.color = "#dc2626";
    msg.innerText = "";

    if(!validRegs.includes(reg)) {
        msg.innerText = "Invalid Registration Number!";
        return;
    }

    if(!stored) {
        msg.innerText = "No account found. Please signup first.";
        return;
    }

    if(stored === pass) {
        window.location.href = reg + ".html"; // redirect to dashboard
    } else {
        msg.innerText = "Incorrect Password!";
    }
}

// Signup function
function signup() {
    const reg = document.getElementById("signupReg").value.trim();
    const pass = document.getElementById("signupPass").value;
    const msg = document.getElementById("msg");
    msg.style.color = "#16a34a";
    msg.innerText = "";

    if(!validRegs.includes(reg)) {
        msg.style.color = "#dc2626";
        msg.innerText = "Invalid Registration Number!";
        return;
    }

    if(localStorage.getItem(reg) !== null) {
        msg.style.color = "#dc2626";
        msg.innerText = "Password already created! Cannot be changed.";
        return;
    }

    if(pass.length < 8) {
        msg.style.color = "#dc2626";
        msg.innerText = "Password must be at least 8 characters!";
        return;
    }

    localStorage.setItem(reg, pass);
    msg.innerText = "Account created successfully! You can now login.";
    setTimeout(showLogin, 1500); // automatically switch to login
}

// Show signup form
function showSignup() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("signupForm").classList.remove("hidden");
    document.getElementById("msg").innerText = "";
}

// Show login form
function showLogin() {
    document.getElementById("signupForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("msg").innerText = "";
}
</script>

</body>
    </html>
