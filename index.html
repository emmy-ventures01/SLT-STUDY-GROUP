<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STUDY GROUP SLT</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
    padding: 0;
    text-align: center;
}

header {
    background: #1d4ed8;
    color: white;
    padding: 15px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid white;
    margin-bottom: 10px;
}

header h2 {
    margin: 0;
    font-size: 24px;
}

.container {
    max-width: 350px;
    margin: 40px auto;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

h3 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    background: #1d4ed8;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #2563eb;
}

#createBox {
    display: none;
    margin-top: 20px;
}

#msg {
    margin-top: 12px;
    font-weight: bold;
    color: #d00;
}
</style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/wt6gV7BL/logo.png">
    <h2>STUDY GROUP SLT</h2>
</header>

<div class="container">
<h3>Student Login</h3>

<input id="reg" placeholder="Registration Number">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="createBox">
    <h4>Create Password</h4>
    <input id="newPass" type="password" placeholder="Create Password (min 8 characters)">
    <button onclick="create()">Create Account</button>
</div>

<p id="msg"></p>
</div>

<script>
const valid = ["2025SGS01","2025SGS02","2025SGS03","2025SGS04","2025SGS05","2025SGS06","2025SGS07","2025SGS08","2025SGS09"];

function login() {
    let reg = document.getElementById("reg").value.trim();
    let pass = document.getElementById("pass").value;
    let stored = localStorage.getItem(reg);
    document.getElementById("msg").innerText = "";

    if(!valid.includes(reg)){
        document.getElementById("msg").innerText = "Invalid Registration Number!";
        return;
    }

    if(stored === null){
        document.getElementById("createBox").style.display = "block";
        document.getElementById("msg").innerText = "No account found. Create your password.";
        return;
    }

    if(pass === stored){
        window.location.href = reg + ".html";
    } else {
        document.getElementById("msg").innerText = "Incorrect Password!";
    }
}

function create() {
    let reg = document.getElementById("reg").value.trim();
    let newPass = document.getElementById("newPass").value;

    if(localStorage.getItem(reg) !== null){
        document.getElementById("msg").innerText = "Password already created!";
        return;
    }

    if(newPass.length < 8){
        document.getElementById("msg").innerText = "Password must be at least 8 characters!";
        return;
    }

    localStorage.setItem(reg, newPass);
    document.getElementById("msg").innerText = "Account created successfully! Now login.";
    document.getElementById("createBox").style.display = "none";
}
</script>

</body>
</html>
