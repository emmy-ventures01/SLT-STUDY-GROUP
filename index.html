<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLT Student Portal</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2ff;
}

/* HEADER */
header {
    background: #1e3a8a;
    color: white;
    padding: 20px;
    text-align: center;
}
header img {
    width: 70px;
    border-radius: 50%;
}

/* CARD */
.card {
    background: white;
    margin: 30px auto;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    position: relative;
    margin-bottom: 15px;
}
input {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* SHOW PASSWORD */
.toggle {
    position: absolute;
    right: 15px;
    top: 18px;
    cursor: pointer;
    font-size: 14px;
    color: #1e3a8a;
}

/* BUTTON */
button {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #1e3a8a;
    color: white;
    margin-top: 10px;
}

/* LINK */
.link {
    margin-top: 15px;
    display: block;
    color: #1e3a8a;
    text-align: center;
    cursor: pointer;
}

/* MESSAGE */
#msg {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

/* HIDE */
.hidden { display: none; }

</style>
</head>

<body>

<header>
    <img src="https://i.postimg.cc/wt6gV7BL/logo.png">
    <h2>SLT STUDENT PORTAL</h2>
</header>

<!-- LOGIN -->
<div class="card" id="loginForm">
    <h2>Login</h2>

    <div class="input-group">
        <input id="loginReg" placeholder="Registration Number">
    </div>

    <div class="input-group">
        <input id="loginPass" type="password" placeholder="Password">
        <span class="toggle" onclick="togglePass('loginPass')">Show</span>
    </div>

    <button onclick="login()">Login</button>

    <span class="link" onclick="showSignup()">Don't have an account? Signup</span>
</div>

<!-- SIGNUP -->
<div class="card hidden" id="signupForm">
    <h2>Create Account</h2>

    <div class="input-group">
        <input id="signupReg" placeholder="Registration Number">
    </div>

    <div class="input-group">
        <input id="signupPass" type="password" placeholder="Create Password (8+)">
        <span class="toggle" onclick="togglePass('signupPass')">Show</span>
    </div>

    <button onclick="signup()">Create Account</button>

    <span class="link" onclick="showLogin()">Back to Login</span>
</div>

<p id="msg"></p>

<script>

// 🔥 RESET OLD DATA ONCE
if (!localStorage.getItem("resetDone")) {
    localStorage.clear();
    localStorage.setItem("resetDone", "true");
}

// VALID USERS
const validRegs = [
"2025SGS01","2025SGS02","2025SGS03",
"2025SGS04","2025SGS05","2025SGS06",
"2025SGS07","2025SGS08","2025SGS09"
];

// LOGIN
function login() {
let reg = loginReg.value.trim();
let pass = loginPass.value;
let stored = localStorage.getItem(reg);

msg.style.color = "red";

if (!validRegs.includes(reg)) {
msg.innerText = "Invalid Registration Number!";
return;
}

if (!stored) {
msg.innerText = "No account found. Signup first.";
return;
}

if (stored === pass) {
window.location.href = reg + ".html";
} else {
msg.innerText = "Incorrect Password!";
}
}

// SIGNUP
function signup() {
let reg = signupReg.value.trim();
let pass = signupPass.value;

if (!validRegs.includes(reg)) {
msg.style.color = "red";
msg.innerText = "Invalid Registration Number!";
return;
}

if (localStorage.getItem(reg)) {
msg.style.color = "red";
msg.innerText = "Password already exists!";
return;
}

if (pass.length < 8) {
msg.style.color = "red";
msg.innerText = "Password must be at least 8 characters!";
return;
}

localStorage.setItem(reg, pass);
msg.style.color = "green";
msg.innerText = "Account created successfully!";
setTimeout(showLogin, 1500);
}

// SWITCH FORMS
function showSignup() {
loginForm.classList.add("hidden");
signupForm.classList.remove("hidden");
msg.innerText = "";
}

function showLogin() {
signupForm.classList.add("hidden");
loginForm.classList.remove("hidden");
msg.innerText = "";
}

// SHOW/HIDE PASSWORD
function togglePass(id) {
let input = document.getElementById(id);
input.type = input.type === "password" ? "text" : "password";
}

</script>

</body>
            </html>
