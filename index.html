<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STUDY GROUP SLT</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: white;
    margin: 0;
    text-align: center;
}

header {
    background: #1d4ed8;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

header img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid white;
}

header h2 {
    margin: 0;
}

.container {
    margin-top: 50px;
}

input {
    width: 260px;
    padding: 12px;
    margin: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    background: #1d4ed8;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

#createBox {
    display: none;
    margin-top: 20px;
}

#msg {
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>
<body>

<header>
    <img src="https://i.postimg.cc/wt6gV7BL/logo.png">
    <h2>STUDY GROUP SLT</h2>
</header>

<div class="container">

<h3>Student Login</h3>

<input id="reg" placeholder="Registration Number"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<div id="createBox">
    <h4>Create Password</h4>
    <input id="newPass" type="password" placeholder="Create Password (min 8 characters)"><br>
    <button onclick="create()">Create Account</button>
</div>

<p id="msg"></p>

</div>

<script>
// ✅ All 9 valid registration numbers
const valid = ["2025SGS01","2025SGS02","2025SGS03","2025SGS04","2025SGS05","2025SGS06","2025SGS07","2025SGS08","2025SGS09"];

// Login function
function login() {
    let reg = document.getElementById("reg").value.trim();
    let pass = document.getElementById("pass").value;
    let stored = localStorage.getItem(reg);

    document.getElementById("msg").innerText = "";

    // Invalid registration number
    if(!valid.includes(reg)){
        document.getElementById("msg").innerText = "Invalid Registration Number!";
        return;
    }

    // No password yet → show create password box
    if(stored === null){
        document.getElementById("createBox").style.display = "block";
        document.getElementById("msg").innerText = "No account found. Create your password.";
        return;
    }

    // Check password
    if(pass === stored){
        // Redirect to student-specific dashboard
        window.location.href = reg + ".html";
    } else {
        document.getElementById("msg").innerText = "Incorrect Password!";
    }
}

// Create password function
function create() {
    let reg = document.getElementById("reg").value.trim();
    let newPass = document.getElementById("newPass").value;

    // Prevent overwrite
    if(localStorage.getItem(reg) !== null){
        document.getElementById("msg").innerText = "Password already created!";
        return;
    }

    // Validate length
    if(newPass.length < 8){
        document.getElementById("msg").innerText = "Password must be at least 8 characters!";
        return;
    }

    // Save password permanently
    localStorage.setItem(reg, newPass);
    document.getElementById("msg").innerText = "Account created successfully! Now login.";
    document.getElementById("createBox").style.display = "none";
}
</script>

</body>
</html>
