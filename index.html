<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STUDY GROUP SLT - Portal</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        margin: 0;
        padding: 0;
    }

    header {
        background-color: #1d4ed8;
        color: white;
        padding: 20px;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    header img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid white;
    }

    header h1 {
        margin: 0;
    }

    .container {
        width: 90%;
        max-width: 400px;
        margin: 50px auto;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: #1d4ed8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #2563eb;
    }

    .hidden {
        display: none;
    }

    .message {
        margin-top: 15px;
        color: green;
        font-weight: bold;
    }

    .error {
        color: red;
    }
</style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/wt6gV7BL/logo.png">
    <h1>STUDY GROUP SLT</h1>
</header>

<div class="container">

    <h2>Student Login</h2>

    <input type="text" id="regNumber" placeholder="Enter Registration Number">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div id="createSection" class="hidden">
        <h3>Create Password</h3>
        <input type="password" id="newPassword" placeholder="Create Password (8 characters)">
        <button onclick="createAccount()">Create Account</button>
    </div>

    <div id="message" class="message"></div>
    <div id="error" class="error"></div>

</div>

<script>
const validUsers = [
    "2025SGS01",
    "2025SGS02",
    "2025SGS03",
    "2025SGS04",
    "2025SGS05",
    "2025SGS06",
    "2025SGS07",
    "2025SGS08",
    "2025SGS09"
];

function login() {
    let reg = document.getElementById("regNumber").value.trim();
    let pass = document.getElementById("password").value;
    let savedPass = localStorage.getItem(reg);

    document.getElementById("error").innerText = "";
    document.getElementById("message").innerText = "";

    if (!validUsers.includes(reg)) {
        document.getElementById("error").innerText = "Invalid Registration Number!";
        return;
    }

    if (!savedPass) {
        document.getElementById("createSection").classList.remove("hidden");
        document.getElementById("message").innerText = "No account found. Create your password.";
        return;
    }

    if (pass === savedPass) {
        window.location.href = reg + ".html";
    } else {
        document.getElementById("error").innerText = "Incorrect Password!";
    }
}

function createAccount() {
    let reg = document.getElementById("regNumber").value.trim();
    let newPass = document.getElementById("newPassword").value;

    if (newPass.length < 8) {
        document.getElementById("error").innerText = "Password must be at least 8 characters!";
        return;
    }

    if (localStorage.getItem(reg)) {
        document.getElementById("error").innerText = "Password already created!";
        return;
    }

    localStorage.setItem(reg, newPass);

    document.getElementById("message").innerText = "Account created successfully! You can now login.";
    document.getElementById("createSection").classList.add("hidden");
}
</script>

</body>
</html>
